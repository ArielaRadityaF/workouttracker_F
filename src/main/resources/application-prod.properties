spring.application.name=workouttracker

# PostgreSQL connection — values come from environment variables set on the
# hosting platform (Railway/Render), not hardcoded here.
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Creates/updates tables automatically based on the JPA entities (fine for a small app;
# for a real production app you'd normally switch to Flyway/Liquibase migrations instead).
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# H2 console is H2-only — turn it off in production since we're on Postgres now.
spring.h2.console.enabled=false

# Railway/Render inject the port to listen on via $PORT
server.port=${PORT:8080}
